<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Stream Telemetry</title>
    <!-- Public Sans for crisp UI text, Space Mono for raw data -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="header-content">
                <h1>Stream Telemetry</h1>
                <p><span class="live-indicator"></span> Real-Time Analytics Pipeline</p>
            </div>
            <div class="controls">
                <select id="streamerSelect" onchange="fetchData()">
                    <option value="kaicenat">KAI CENAT</option>
                    <option value="xqc">XQC</option>
                    <option value="fanum">FANUM</option>
                    <option value="pokimane">POKIMANE</option>
                    <option value="asmongold">ASMONGOLD</option>
                    <option value="hasanabi">HASANabi</option>
                </select>
            </div>
        </div>

        <div id="anomalyBanner" class="anomaly-alert">
            <div class="anomaly-text">⚠️ VIRAL ANOMALY DETECTED: UNUSUAL GROWTH RATE (RAID?)</div>
            <div id="anomalyDetails" class="badge">Z-SCORE: 0.00</div>
        </div>

        <div class="grid">
            <div class="panel">
                <div class="panel-header">
                    <h3>Prediction (30m)</h3>
                    <span id="kpi-predict-trend" class="badge stable">WAITING</span>
                </div>
                <p id="kpi-predict" class="stat-value">---</p>
                <p class="stat-sub">Model: Polynomial OLS</p>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h3>Error Margin</h3>
                    <span class="badge stable">MSE</span>
                </div>
                <p id="kpi-error" class="stat-value">---</p>
                <p class="stat-sub">95% Confidence (±)</p>
            </div>
            
            <div class="panel">
                <div class="panel-header">
                    <h3>Sentiment Volatility</h3>
                    <span id="kpi-sentiment-badge" class="badge stable">NLP</span>
                </div>
                <p id="kpi-sentiment" class="stat-value">---</p>
                <p class="stat-sub" id="kpi-sentiment-vol">Var: ---</p>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script src="/static/js/app.js" defer></script>
</body>
</html>
