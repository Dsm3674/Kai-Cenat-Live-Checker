<!DOCTYPE html>
<html>
<head>
  <title>Kai Cenat Live Checker</title>
  <link rel="stylesheet" href="kaiCenat.css">
  <style>
    #liveBanner {
      display: none;
      padding: 20px;
      background-color: red;
      color: white;
      font-size: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Lets see if Kai Cenat is live:</h1>
  <br>
  <p>If the screen is blank he isn't live otherwise he is</p>
  
  <div id="liveBanner">🔥 Kai Cenat is LIVE on Twitch! 🥭 🔥</div>

  <script>
    // ✅ FIXED: Now uses your backend API instead of direct Twitch API
    const userLogin = 'kaicenat';

    async function checkIfLive() {
      try {
        // Call your backend API (no credentials needed in frontend!)
        const res = await fetch(`http://localhost:5050/api/live/${userLogin}`);

        if (!res.ok) {
          console.error('Backend API error:', res.status, res.statusText);
          return;
        }

        const data = await res.json();
        const isLive = data.live === true;

        if (isLive) {
          document.getElementById('liveBanner').style.display = 'block';
        } else {
          document.getElementById('liveBanner').style.display = 'none';
        }
      } catch (error) {
        console.error('Fetch error:', error);
      }
    }

    // Check immediately and then every minute
    checkIfLive();
    setInterval(checkIfLive, 60000);
  </script>
</body>
</html>
